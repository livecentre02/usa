body {

/* 🔝 BANNER */
.top-banner {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: #111;
    z-index: 99999;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* ADS */
.ads-wrapper {
    width: 320px;
    height: 50px;
}

/* 🎬 IFRAME */
.iframe-container {
    position: fixed;
    top: 60px;
    width: 100%;
    height: calc(100vh - 60px);
    z-index: 1;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* 🔥 OVERLAY KLIK */
.click-layer {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    height: calc(100vh - 60px);
    z-index: 9998; /* di bawah banner */
    background: transparent;
    cursor: pointer;
}
</style>
