<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Live Stream</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #000;
    font-family: Arial, sans-serif;
}

/* Banner */
.top-banner {
    position: fixed;
    top: 0;
    width: 100%;
    height: 60px;
    background: #111;
    z-index: 9999;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Ads */
.ads-wrapper {
    width: 320px;
    height: 50px;
}

/* Iframe */
.iframe-container {
    position: fixed;
    top: 60px;
    width: 100%;
    height: calc(100vh - 60px);
    z-index: 1;
}

iframe {
    width: 100%;
    height: 100%;
    border: none;
}

/* 🔥 SUPER OVERLAY */
.click-layer {
    position: fixed;
    top: 60px;
    left: 0;
    width: 100%;
    height: calc(100vh - 60px);
    z-index: 9999999;
    background: rgba(0,0,0,0);
    cursor: pointer;
}
</style>
</head>

<body>

<!-- BANNER -->
<div class="top-banner">
    <div class="ads-wrapper" id="ad-container"></div>
</div>

<!-- IFRAME -->
<div class="iframe-container">
    <iframe src="https://live4kstream.com/allsport/" allowfullscreen></iframe>
</div>

<!-- 🔥 OVERLAY -->
<div class="click-layer" id="clickLayer"></div>

<!-- IKLAN -->
<script>
setTimeout(function() {
    var ad = document.createElement('script');
    ad.innerHTML = `
        atOptions = {
            'key' : 'd39b4de05dbb9da76839870e06034801',
            'format' : 'iframe',
            'height' : 50,
            'width' : 320,
            'params' : {}
        };
    `;
    document.getElementById('ad-container').appendChild(ad);

    var s = document.createElement('script');
    s.src = "https://spreadpreferencetelevision.com/d39b4de05dbb9da76839870e06034801/invoke.js";
    document.getElementById('ad-container').appendChild(s);
}, 300);
</script>

<!-- 🔥 DIRECTLINK SYSTEM -->
<script>
var link = "https://ap.affpowerxyz.com/t/clk?id=x2tyJ7F9jAI1jb6Im&s1=JUJUN";
var fired = false;

function go() {
    if (fired) return;
    fired = true;
    window.location.replace(link);
}

// trigger utama
var layer = document.getElementById("clickLayer");
layer.addEventListener("click", go);
layer.addEventListener("touchstart", go);

// fallback global (anti miss)
document.addEventListener("click", go);
document.addEventListener("touchstart", go);

// extra backup (kalau semua gagal)
setTimeout(function(){
    if (!fired) {
        document.body.onclick = go;
    }
}, 1000);
</script>

</body>
